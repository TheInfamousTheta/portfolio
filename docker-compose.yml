services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kaustubh-portfolio
    ports:
      - "6000:3000"
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: always
